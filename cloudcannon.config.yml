timezone: Pacific/Auckland

paths:
  static: public
  uploads: public/images

commit_templates:
  - label: Default message
    template_string: '[default_commit_message]'
  - label: Custom message
    template_string: '{message}'

collections_config:
  pages:
    path: src/content/pages
    glob:
      - '**/*.md'
      - '**/*.astro'
    url: '/[full_slug]/'
    icon: laptop_mac
    _enabled_editors:
      - visual
    add_options:
      - name: Add New Page
        schema: default
        icon: pages
    schemas:
      default:
        name: New Page
        path: '.cloudcannon/schemas/page.md'
        remove_extra_inputs: false
      paginated:
        name: Paginated collection
        path: '.cloudcannon/schemas/paginated.md'
        remove_extra_inputs: false
      source_page:
        name: Source Editable Page
        path: '.cloudcannon/schemas/source-page.astro'
        remove_extra_inputs: false
        hide_extra_inputs: true
    create:
      path: '[relative_base_path]/{filename|slugify|lowercase}.md'
    new_preview_url: /
    _inputs:
      title:
        type: text
        comment: Controls the metadata title for the page.
  blog:
    path: src/content/blog
    glob:
      - '**/*.mdx'
    url: '/blog/[full_slug]/'
    icon: newspaper
    preview:
      text:
        - key: title
      gallery:
        fit: cover
        image:
          - key: thumb_image_path
          - key: post_hero.image
      metadata:
        - icon: calendar_month
          text:
            - template: Created {post_hero.date|date_long}
            - Add date
        - icon: person
          text:
            - template: By {post_hero.author}
            - No author
        - icon: style
          text:
            - template: '{post_hero.tags[*]}'
            - No tags
    _enabled_editors:
      - visual
      - content
    add_options:
      - name: Add New Post
        schema: default
        icon: post_add
        editor: content
    schemas:
      default:
        path: '.cloudcannon/schemas/post.mdx'
    create:
      path: '[relative_base_path]/{filename|slugify|lowercase}.mdx'
    _inputs:
      title:
        comment: Controls the metadata title, and the title used when linking to this page elsewhere on the site.
        options:
          empty_type: string
      post_hero:
        type: object
        options:
          preview:
            image:
              - key: image
            icon: description
      image:
        type: image
        comment: The hero image at the top of the post.
        options:
          empty_type: string
          paths:
            static: ''
            uploads: src/assets/images/blog
      image_alt:
        type: textarea
        options:
          empty_type: string
      thumb_image_path:
        type: image
        label: Thumbnail Image
        comment: The image used as the page thumbnail when being referenced elsewhere on the site.
        options:
          empty_type: string
          paths:
            static: ''
            uploads: src/assets/images/blog
      thumb_image_alt:
        type: textarea
        label: Thumbnail Image Alt Text
        hidden: '!thumb_image_path'
        options:
          empty_type: string
      author:
        options:
          empty_type: string
      tags:
        type: multiselect
        comment: To add a new tag, go to the [tags data file](cloudcannon:collections/data/tags.json).
        options:
          values: data.tags
          empty_type: array
  data:
    path: data
    disable_url: true
    disable_add: true
    disable_add_folder: true
    _inputs:
      header:
        type: object
        options:
          preview:
            icon: menu
            text:
              - Header navigation
      footer:
        type: object
        options:
          preview:
            icon: bottom_navigation
            text:
              - Footer navigation
      logo:
        type: image
      logo_url:
        comment: Link for the logo in the top left of the footer.
      copyright:
        comment: Automatically prefixed with the current year.
      image:
        type: image

collection_groups:
  - heading: Pages
    collections:
      - pages
      - blog
  - heading: Data
    collections:
      - data

data_config:
  tags:
    path: data/tags.json

_editables:
  content:
    blockquote: true
    bold: true
    format: p h2 h3 h4
    italic: true
    strike: true
    subscript: true
    superscript: true
    underline: true
    link: true
    bulletedlist: true
    indent: true
    numberedlist: true
    outdent: true
    code: true
    embed: true
    horizontalrule: true
    image: true
    table: true
    undo: true
    redo: true
    removeformat: true
    copyformatting: true
    styles: /css/editor.css
    left: align-left
    center: align-center
    right: align-right
    justify: align-justify
    image_size_attributes: true

_structures:
  content_blocks:
    values:
      - label: Left Right
        icon: view_column_2
        preview:
          text:
            - key: heading
            - Left Right
          subtext:
            - key: text_content
          image:
            - key: image.image_path
          icon: view_column_2
        value:
          _name: LeftRight
          heading:
          text_content:
          image:
            image_path:
            alt_text:
          flipped: false
          button:
            text:
            link:
      - label: Text Block
        icon: article
        preview:
          text:
            - key: heading
            - Text Block
          subtext:
            - key: text_content
          icon: article
        value:
          _name: TextBlock
          heading:
          text_content:
  hero_blocks:
    values:
      - label: Hero
        icon: flag
        preview:
          text:
            - key: heading
            - Hero
          subtext:
            - key: subheading
          image:
            - key: image.image_path
          icon: flag
        value:
          _name: Hero
          heading:
          subheading:
          image:
            image_path:
            alt_text:
          button:
            text:
            link:

_inputs:
  content_blocks:
    type: array
    options:
      structures: _structures.content_blocks
      empty_type: array
  hero_block:
    type: object
    options:
      structures: _structures.hero_blocks
  text_content:
    type: markdown
    options:
      blockquote: true
      bold: true
      format: p h2 h3 h4
      italic: true
      strike: true
      link: true
      bulletedlist: true
      numberedlist: true
      undo: true
      redo: true
      removeformat: true
      copyformatting: true
  subheading:
    type: markdown
    options:
      blockquote: true
      bold: true
      format: p h2 h3 h4
      italic: true
      strike: true
      link: true
      bulletedlist: true
      numberedlist: true
      undo: true
      redo: true
      removeformat: true
      copyformatting: true
  image:
    type: object
    options:
      preview:
        icon: image
        text: 
          - key: image_alt
          - Image
        subtext:
          - key: image_path
          - Select or upload an image.
        image:
          - key: image_path
  image_path:
    type: image
    comment: The path to the source file of the image.
    options:
      paths:
        static: ''
        uploads: src/assets/images
  alt_text:
    label: Image Alt Text
    type: textarea
    hidden: '!image_path'
  seo:
    type: object
    comment: Set SEO values for the page, otherwise site defaults will be used.
    options:
      preview:
        icon: query_stats
        text:
          - 'Search engine optimization'
        subtext:
          - key: page_description
          - 'Update SEO values for the page'
  layout:
    hidden: true
  date:
    instance_value: NOW
  page_size:
    type: number
    comment: The number of collection items to list per page.
  links[*]:
    type: object
    options:
      preview:
        icon: link
        text:
          - key: text
          - 'Link'
        subtext:
          - key: link
          - 'Add a link'
  button:
    type: object
    options:
      preview:
        icon: smart_button
        text:
          - key: text
          - Button
        subtext:
          - key: link
          - Set button link
  page_description:
    comment: Defaults to the description set in the Site SEO data file.
  canonical_url:
    comment: Defaults to the pages url.
  featured_image:
    comment: Defaults to the image set in the Site SEO data file.
  open_graph_type:
    type: select
    options:
      values:
        - website
        - article
    comment: Defaults to the type 'website'.
  author_twitter_handle:
    comment: Defaults to the twitter site value set in the Site SEO data file.
  twitter_site:
    type: url
  no_index:
    type: checkbox
    comment:
      When selected this removes the page from your sitemap and adds the noindex robots meta tag.
  _name:
    hidden: true
